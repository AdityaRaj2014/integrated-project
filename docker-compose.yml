services:
  backend:
    image: adityaraj2104/healthcare-backend:latest
    restart: always
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}

  rag-backend:
    image: adityaraj2104/rag-backend:latest
    restart: always
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      MONGODB_URL: ${MONGODB_URL}
      DATABASE_NAME: ${DATABASE_NAME}

  frontend:
    image: adityaraj2104/healthcare-frontend:latest
    restart: always
    depends_on:
      - backend
      - rag-backend
    ports:
      - "80:80"
